name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Formula
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint formula
        run: brew audit --formula Formula/labelize.rb || true

      - name: Check formula style
        run: brew style Formula/labelize.rb || true
