name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
          LINUX_X64_SHA256: ${{ github.event.client_payload.linux_x64_sha256 }}
          MAC_ARM64_SHA256: ${{ github.event.client_payload.mac_arm64_sha256 }}
          MAC_X64_SHA256: ${{ github.event.client_payload.mac_x64_sha256 }}
        run: |
          cat > Formula/labelize.rb << EOF
          # Homebrew formula for labelize
          # Install: brew install GOODBOY008/labelize/labelize
          # Or: brew tap GOODBOY008/labelize && brew install labelize
          #
          # Auto-generated by release workflow — do not edit manually.

          class Labelize < Formula
            desc "Turn ZPL/EPL into pixels — label rendering, simplified."
            homepage "https://github.com/GOODBOY008/labelize"
            version "${VERSION#v}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/GOODBOY008/labelize/releases/download/${VERSION}/labelize-aarch64-apple-darwin.tar.gz"
                sha256 "${MAC_ARM64_SHA256}"
              else
                url "https://github.com/GOODBOY008/labelize/releases/download/${VERSION}/labelize-x86_64-apple-darwin.tar.gz"
                sha256 "${MAC_X64_SHA256}"
              end
            end

            on_linux do
              url "https://github.com/GOODBOY008/labelize/releases/download/${VERSION}/labelize-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${LINUX_X64_SHA256}"
            end

            def install
              bin.install "labelize"
            end

            test do
              assert_match "labelize", shell_output("#{bin}/labelize --version")
            end
          end
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ github.event.client_payload.version }}"
          git add Formula/labelize.rb
          git commit -m "Update labelize to ${VERSION}"
          git push
